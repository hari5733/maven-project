apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: maven-project
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hari5733/maven-project.git
    targetRevision: master
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true