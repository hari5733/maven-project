apiVersion: apps/v1
kind: Deployment
metadata:
  name: maven-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maven-project
  template:
    metadata:
      labels:
        app: maven-project
    spec:
      containers:
      - name: maven-project
        image: hari1366/maven-project:latest
        ports:
        - containerPort: 8080
